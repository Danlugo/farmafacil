services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farmafacil
      POSTGRES_PASSWORD: farmafacil
      POSTGRES_DB: farmafacil
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmafacil"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
